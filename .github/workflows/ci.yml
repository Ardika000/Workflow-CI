name: CI Workflow MLProject & Docker

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0 pandas scikit-learn

      - name: Run MLProject
        run: |
          # Pindah ke dalam folder MLProject dan jalankan mlflow run
          cd MLProject
          mlflow run . --no-conda
          
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mlruns-artifacts
          path: MLProject/mlruns/
          
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Build Docker Image using MLflow
        run: |
          cd MLProject
          RUN_ID=$(cat run_id.txt)
          echo "Building Docker image for Run ID: $RUN_ID"
          # Fungsi MLflow untuk membuat Docker Image otomatis dari model!
          mlflow models build-docker -m "runs:/$RUN_ID/model" -n ${{ secrets.DOCKER_USERNAME }}/titanic-model:latest
          
      - name: Push Docker Image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/titanic-model:latest
