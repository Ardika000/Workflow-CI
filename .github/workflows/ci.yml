name: CI Workflow MLProject & Docker

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Run actions/checkout@v3
        uses: actions/checkout@v3

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'

      - name: Check Env
        run: |
          python --version
          pip --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0 pandas scikit-learn

      - name: Run mlflow project
        run: |
          cd MLProject
          mlflow run . --env-manager=local
          
      - name: Get latest MLflow run_id
        run: |
          cd MLProject
          RUN_ID=$(cat run_id.txt)
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "Run ID yang didapat adalah: $RUN_ID"
          
      - name: Install Python dependencies
        run: |
          # Tahapan tambahan sesuai checklist Dicoding
          echo "Dependencies MLflow project sudah terinstall di env lokal"
          
      - name: Upload to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: mlruns-artifacts
          path: MLProject/mlruns/
          
      - name: Build Docker Model
        run: |
          # [Trik Fix Error Python 3.9 get-pip.py]
          # Kita ubah paksa tulisan python3.9 menjadi python3.10 di dalam library mlflow!
          MLFLOW_DIR=$(python -c "import mlflow, os; print(os.path.dirname(mlflow.__file__))")
          sed -i 's/python3.9/python3.10/g' $MLFLOW_DIR/models/docker_utils.py
          
          cd MLProject
          mlflow models build-docker -m "runs:/${{ env.RUN_ID }}/model" -n titanic-model:latest
          
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Tag Docker Image
        run: |
          docker tag titanic-model:latest ${{ secrets.DOCKER_USERNAME }}/titanic-model:latest
          
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/titanic-model:latest